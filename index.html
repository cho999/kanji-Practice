<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kanji Practice</title>
  <style>
    :root{
      --bg:#0b0f1a; --panel:#10192e; --text:#e6e9f2; --muted:#a8b0c3;
      --accent:#7cdbff; --good:#34d399; --bad:#fb7185; --line:rgba(255,255,255,.10);
      --radius:18px; --shadow:0 12px 30px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; padding:20px; display:flex; align-items:center; justify-content:center;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans JP",Meiryo,sans-serif;
      color:var(--text); background:radial-gradient(900px 500px at 15% 0%,rgba(124,219,255,.09),transparent 55%),var(--bg);
    }
    .app{width:min(980px,100%)}
    .topbar{display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:14px}
    .brand{display:flex; align-items:center; gap:10px; font-weight:900}
    .logo{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;color:var(--accent);border:1px solid rgba(124,219,255,.3);background:rgba(124,219,255,.08)}
    .panel,.card,.flashcard{background:rgba(16,25,46,.72); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow)}
    .panel{padding:18px}.card{padding:16px}.flashcard{padding:18px; display:grid; gap:12px; min-height:300px}
    .btnrow{display:flex; flex-wrap:wrap; gap:10px; align-items:center}
    button,.chip{border:1px solid var(--line); background:rgba(255,255,255,.04); color:var(--text); padding:10px 12px; border-radius:14px; cursor:pointer; font-weight:800; font-size:13px}
    button:hover{border-color:rgba(124,219,255,.38); background:rgba(124,219,255,.08)}
    button.primary{border-color:rgba(124,219,255,.45); background:rgba(124,219,255,.13)}
    button.danger{border-color:rgba(251,113,133,.4); background:rgba(251,113,133,.12)}
    button:disabled{opacity:.55; cursor:not-allowed}
    .hidden{display:none!important}.title{font-size:18px; margin:0 0 8px}.sub{color:var(--muted); font-size:13px; margin:0; line-height:1.5}.divider{height:1px;background:var(--line);margin:14px 0}
    .level-list,.checklist{display:flex; flex-direction:column; gap:10px}
    .level-item,.check-item{display:flex; justify-content:space-between; align-items:center; gap:12px; padding:12px; border-radius:16px; background:rgba(15,23,42,.55); border:1px solid rgba(255,255,255,.07)}
    .level-name{font-weight:900}.kanji-list{color:var(--muted); font-size:13px; margin-top:3px}
    .fc-head{display:flex; justify-content:space-between; align-items:center}.badge{font-size:12px;padding:6px 10px;border-radius:999px;border:1px solid rgba(124,219,255,.28);color:var(--accent);font-weight:900}.progress{font-size:12px;color:var(--muted)}
    .stage{min-height:210px; display:grid; place-items:center; text-align:center; border:1px dashed rgba(255,255,255,.14); border-radius:20px; background:rgba(11,15,26,.35); padding:18px}
    .big{font-size:92px;font-weight:900;line-height:1.15;margin:0}.word{font-size:44px;font-weight:900;margin:8px 0 0}.wordReading{font-size:26px;font-weight:800;margin:4px 0 0}.romaji{font-size:14px;color:var(--muted);font-weight:800;margin-top:4px}.hint{font-size:12px;color:var(--muted);margin-top:12px}
    ruby{ruby-position:over; ruby-align:center} rt{font-size:26px;font-weight:900;color:rgba(230,233,242,.96)} rt .ruby-romaji{display:block;font-size:14px;color:var(--muted);margin-top:3px}
    .options{display:grid; grid-template-columns:1fr; gap:10px}@media(min-width:720px){.options{grid-template-columns:1fr 1fr}}
    .opt{text-align:left; min-height:56px; display:flex; justify-content:space-between; align-items:center}.opt.good{border-color:rgba(52,211,153,.55);background:rgba(52,211,153,.12)}.opt.bad{border-color:rgba(251,113,133,.55);background:rgba(251,113,133,.12)}
    .mark{margin:10px auto 0;width:78px;height:78px;border-radius:22px;display:grid;place-items:center;font-size:52px;font-weight:1000;border:1px solid var(--line)}.mark.good{color:var(--good);background:rgba(52,211,153,.12)}.mark.bad{color:var(--bad);background:rgba(251,113,133,.12)}
    .toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);opacity:0;pointer-events:none;background:rgba(15,23,42,.94);border:1px solid var(--line);border-radius:999px;padding:10px 14px;font-size:12px;transition:.18s}.toast.show{opacity:1;transform:translateX(-50%) translateY(-2px)}
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand"><div class="logo">字</div><div>Kanji Practice</div></div>
    <div class="btnrow"><button id="homeBtn">Home</button><button id="levelsBtn">Levels</button><button id="resetBtn" class="danger">Reset</button></div>
  </div>
  <main class="panel">
    <section id="homeScreen">
      <div class="card">
        <h1 class="title">Choose mode</h1>
        <div class="btnrow"><button id="testModeBtn" class="primary">Test mode</button><button id="flashModeBtn">Flashcards</button></div>
        <p class="sub" style="margin-top:10px">Flash: Space reveals. Test: choose the correct reading.</p>
      </div>
    </section>

    <section id="levelsScreen" class="hidden">
      <div class="card">
        <div class="btnrow" style="justify-content:space-between"><h1 class="title">Levels</h1><label class="chip"><input id="romajiCheck" type="checkbox"> Show Romaji</label></div>
        <div class="divider"></div><div id="levelList" class="level-list"></div>
      </div>
    </section>

    <section id="flashScreen" class="hidden">
      <div class="flashcard">
        <div class="fc-head"><div id="flashBadge" class="badge">LEVEL</div><div id="flashProgress" class="progress">0 / 0</div></div>
        <div class="stage"><div><p id="flashPrompt" class="big">漢</p><p id="flashWord" class="word hidden">—</p><p id="flashWordReading" class="wordReading hidden"></p><p id="flashWordRomaji" class="romaji hidden"></p><div id="flashHint" class="hint">Space: show reading</div></div></div>
        <div class="btnrow" style="justify-content:space-between"><div class="btnrow"><button id="prevBtn">← Prev</button><button id="revealBtn" class="primary">Reveal</button><button id="nextBtn">Next →</button></div><button id="backLevelsBtn">Back</button></div>
      </div>
    </section>

    <section id="testConfigScreen" class="hidden">
      <div class="card">
        <div class="btnrow" style="justify-content:space-between"><div><h1 class="title">Test range</h1><p class="sub">Select levels to include.</p></div><div class="btnrow"><label class="chip"><input id="testRomajiCheck" type="checkbox"> Show Romaji</label><button id="startTestBtn" class="primary">Start test</button></div></div>
        <div class="divider"></div><div id="testLevelList" class="checklist"></div>
      </div>
    </section>

    <section id="testScreen" class="hidden">
      <div class="flashcard">
        <div class="fc-head"><div id="testBadge" class="badge">TEST</div><div id="testProgress" class="progress">0 / 0</div></div>
        <div class="stage"><div><p id="testPrompt" class="big">漢</p><div id="testMark" class="mark hidden">◯</div><div id="testHint" class="hint">Pick the correct reading</div></div></div>
        <div id="testOptions" class="options"></div>
        <div class="btnrow" style="justify-content:space-between"><div class="btnrow"><button id="skipBtn">Skip</button><button id="testNextBtn" class="primary" disabled>Next</button></div><button id="testBackBtn">Back</button></div>
      </div>
    </section>
  </main>
</div>
<div id="toast" class="toast"></div>

<script>
const COMPOUNDS = [
  { word:"先週", readingKana:"せんしゅう" },
  { word:"王国", readingKana:"おうこく" },
];
const KANJI_POOL = [
  { kanji:"見ます", readingKana:"み" },{ kanji:"行きます", readingKana:"い" },{ kanji:"米", readingKana:"こめ" },{ kanji:"来ます", readingKana:"き" },{ kanji:"良い", readingKana:"い" },{ kanji:"食べます", readingKana:"た" },
  { kanji:"飲みます", readingKana:"の" },{ kanji:"会います", readingKana:"あ" },{ kanji:"耳", readingKana:"みみ" },{ kanji:"聞きます", readingKana:"き" },{ kanji:"言います", readingKana:"い" },{ kanji:"話します", readingKana:"はな" },
  { kanji:"立ちます", readingKana:"た" },{ kanji:"待ちます", readingKana:"ま" },{ kanji:"周ります", readingKana:"まわ" },{ kanji:"週", readingKana:"しゅう", word:"先週", wordReadingKana:"せんしゅう" },{ kanji:"大きい", readingKana:"おお" },{ kanji:"小さい", readingKana:"ちい" },
  { kanji:"高い", readingKana:"たか" },{ kanji:"安い", readingKana:"やす" },{ kanji:"国", readingKana:"くに", word:"王国", wordReadingKana:"おうこく" },{ kanji:"王", readingKana:"おう", word:"王国", wordReadingKana:"おうこく" },{ kanji:"年", readingKana:"ねん" },{ kanji:"父", readingKana:"ちち" },
  { kanji:"男", readingKana:"おとこ" },{ kanji:"女", readingKana:"おんな" },{ kanji:"母", readingKana:"はは" },{ kanji:"子", readingKana:"こ" },
];

const $ = id => document.getElementById(id);
const screens = ["home","levels","flash","testConfig","test"].reduce((a,n)=>(a[n]=$(n+"Screen"),a),{});
const state = { screen:"home", levelId:null, deck:[], index:0, phase:0, romaji:false, selected:new Set(), currentTest:null, locked:false, score:{correct:0,total:0} };
const levels = makeLevels(KANJI_POOL, 6);

function makeLevels(cards, size){
  const out=[]; for(let i=0;i<cards.length;i+=size){ out.push({id:"lvl_"+(out.length+1), name:"Level "+(out.length+1), cards:cards.slice(i,i+size)}); } return out;
}
function show(screen){ state.screen=screen; Object.entries(screens).forEach(([k,el])=>el.classList.toggle("hidden",k!==screen)); }
function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toast.timer); toast.timer=setTimeout(()=>t.classList.remove("show"),1200); }
function esc(s){ return String(s??"").replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m])); }
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function unique(arr){ return [...new Set(arr.filter(Boolean))]; }
function firstReading(s){ return String(s||"").split("/")[0].trim(); }

function kanaToRomaji(input){
  const map={あ:"a",い:"i",う:"u",え:"e",お:"o",か:"ka",き:"ki",く:"ku",け:"ke",こ:"ko",さ:"sa",し:"shi",す:"su",せ:"se",そ:"so",た:"ta",ち:"chi",つ:"tsu",て:"te",と:"to",な:"na",に:"ni",ぬ:"nu",ね:"ne",の:"no",は:"ha",ひ:"hi",ふ:"fu",へ:"he",ほ:"ho",ま:"ma",み:"mi",む:"mu",め:"me",も:"mo",や:"ya",ゆ:"yu",よ:"yo",ら:"ra",り:"ri",る:"ru",れ:"re",ろ:"ro",わ:"wa",を:"o",ん:"n",が:"ga",ぎ:"gi",ぐ:"gu",げ:"ge",ご:"go",ざ:"za",じ:"ji",ず:"zu",ぜ:"ze",ぞ:"zo",だ:"da",ぢ:"ji",づ:"zu",で:"de",ど:"do",ば:"ba",び:"bi",ぶ:"bu",べ:"be",ぼ:"bo",ぱ:"pa",ぴ:"pi",ぷ:"pu",ぺ:"pe",ぽ:"po",ゃ:"ya",ゅ:"yu",ょ:"yo"};
  const dig={きゃ:"kya",きゅ:"kyu",きょ:"kyo",しゃ:"sha",しゅ:"shu",しょ:"sho",ちゃ:"cha",ちゅ:"chu",ちょ:"cho",にゃ:"nya",にゅ:"nyu",にょ:"nyo",ひゃ:"hya",ひゅ:"hyu",ひょ:"hyo",みゃ:"mya",みゅ:"myu",みょ:"myo",りゃ:"rya",りゅ:"ryu",りょ:"ryo",ぎゃ:"gya",ぎゅ:"gyu",ぎょ:"gyo",じゃ:"ja",じゅ:"ju",じょ:"jo",びゃ:"bya",びゅ:"byu",びょ:"byo",ぴゃ:"pya",ぴゅ:"pyu",ぴょ:"pyo"};
  const s=String(input||""); let out="";
  for(let i=0;i<s.length;i++){
    if(s[i]==="っ"){ const next=dig[s.slice(i+1,i+3)]||map[s[i+1]]||""; if(next) out+=next[0]; continue; }
    const pair=s.slice(i,i+2); if(dig[pair]){ out+=dig[pair]; i++; continue; }
    if(s[i]==="ー"){ const v=(out.match(/[aeiou](?=[^aeiou]*$)/)||[""])[0]; out+=v; continue; }
    out += map[s[i]] ?? s[i];
  }
  return out;
}

function renderLevels(){
  $("levelList").innerHTML = levels.map(l=>`<div class="level-item"><div><div class="level-name">${esc(l.name)}</div><div class="kanji-list">${esc(l.cards.map(c=>c.kanji).join("　"))}</div></div><button class="primary" data-open="${l.id}">Open</button></div>`).join("");
  document.querySelectorAll("[data-open]").forEach(b=>b.onclick=()=>openLevel(b.dataset.open));
  $("romajiCheck").checked=state.romaji;
}
function openLevel(id){ const level=levels.find(l=>l.id===id); if(!level) return; state.levelId=id; state.deck=[...level.cards]; state.index=0; state.phase=0; $("flashBadge").textContent=level.name; show("flash"); renderFlash(); }
function currentCard(){ return state.deck[state.index]; }
function promptWithRuby(text, reading, showReading){
  if(!showReading) return esc(text);
  const kana=firstReading(reading), roma=state.romaji ? `<span class="ruby-romaji">${esc(kanaToRomaji(kana))}</span>` : "";
  return `<ruby><rb>${esc(text)}</rb><rt>${esc(kana)}${roma}</rt></ruby>`;
}
function renderFlash(){
  const c=currentCard(); if(!c) return;
  $("flashPrompt").innerHTML=promptWithRuby(c.kanji,c.readingKana,state.phase>=1);
  $("flashWord").textContent=c.word||"—";
  $("flashWordReading").textContent=c.wordReadingKana||"";
  $("flashWordRomaji").textContent=c.wordReadingKana ? kanaToRomaji(c.wordReadingKana) : "";
  $("flashWord").classList.toggle("hidden",state.phase<2);
  $("flashWordReading").classList.toggle("hidden",state.phase<3 || !c.wordReadingKana);
  $("flashWordRomaji").classList.toggle("hidden",state.phase<3 || !c.wordReadingKana || !state.romaji);
  $("flashProgress").textContent=`${state.index+1} / ${state.deck.length}`;
  $("flashHint").textContent=["Space: show reading","Space: show word","Space: show word reading","Space: next kanji"][state.phase]||"";
}
function reveal(){ state.phase<3 ? state.phase++ : nextCard(); renderFlash(); }
function nextCard(){ state.index=(state.index+1)%state.deck.length; state.phase=0; renderFlash(); }
function prevCard(){ state.index=(state.index-1+state.deck.length)%state.deck.length; state.phase=0; renderFlash(); }

function renderTestConfig(){
  if(state.selected.size===0) levels.forEach(l=>state.selected.add(l.id));
  $("testLevelList").innerHTML=levels.map(l=>`<div class="check-item"><label><input type="checkbox" data-check="${l.id}" ${state.selected.has(l.id)?"checked":""}> <b>${esc(l.name)}</b></label><span class="sub">${esc(l.cards.map(c=>c.kanji).join(" "))}</span></div>`).join("");
  document.querySelectorAll("[data-check]").forEach(cb=>cb.onchange=()=> cb.checked ? state.selected.add(cb.dataset.check) : state.selected.delete(cb.dataset.check));
  $("testRomajiCheck").checked=state.romaji;
}
function testItems(){
  const selectedCards=levels.filter(l=>state.selected.has(l.id)).flatMap(l=>l.cards);
  return selectedCards.map(c=>({type:"KANJI", prompt:c.kanji, answer:firstReading(c.readingKana)}))
    .concat(COMPOUNDS.map(w=>({type:"WORD", prompt:w.word, answer:w.readingKana})));
}
function allAnswers(){ return unique(KANJI_POOL.map(c=>firstReading(c.readingKana)).concat(COMPOUNDS.map(w=>w.readingKana))); }
function startTest(){ if(state.selected.size===0) return toast("Select at least 1 level"); state.score={correct:0,total:0}; show("test"); nextQuestion(); }
function nextQuestion(){
  const items=testItems(); if(items.length===0) return toast("No items");
  state.currentTest=shuffle(items)[0]; state.locked=false;
  $("testBadge").textContent=state.currentTest.type; $("testPrompt").textContent=state.currentTest.prompt; $("testMark").className="mark hidden"; $("testHint").textContent="Pick the correct reading"; $("testNextBtn").disabled=true;
  const options=shuffle(unique([state.currentTest.answer,...shuffle(allAnswers()).filter(a=>a!==state.currentTest.answer)]).slice(0,4));
  $("testOptions").innerHTML=options.map(o=>`<button class="opt" data-answer="${esc(o)}"><span><b>${esc(o)}</b><div class="sub">${state.romaji?esc(kanaToRomaji(o)):""}</div></span><span class="sub">→</span></button>`).join("");
  document.querySelectorAll("[data-answer]").forEach(b=>b.onclick=()=>chooseAnswer(b.dataset.answer));
  $("testProgress").textContent=`${state.score.correct} / ${state.score.total}`;
}
function chooseAnswer(answer){
  if(state.locked) return; state.locked=true; state.score.total++;
  const correct=state.currentTest.answer, ok=answer===correct; if(ok) state.score.correct++;
  document.querySelectorAll("[data-answer]").forEach(b=>{ const v=b.dataset.answer; if(v===correct)b.classList.add("good"); else if(v===answer)b.classList.add("bad"); b.disabled=true; });
  $("testMark").textContent=ok?"◯":"✕"; $("testMark").className="mark "+(ok?"good":"bad"); $("testHint").textContent=ok?`Correct: ${correct}`:`Wrong · Answer: ${correct}`; $("testProgress").textContent=`${state.score.correct} / ${state.score.total}`; $("testNextBtn").disabled=false;
}

$("homeBtn").onclick=()=>show("home");
$("levelsBtn").onclick=()=>{renderLevels(); show("levels")};
$("flashModeBtn").onclick=()=>{renderLevels(); show("levels")};
$("testModeBtn").onclick=()=>{renderTestConfig(); show("testConfig")};
$("romajiCheck").onchange=e=>{state.romaji=e.target.checked; renderFlash();};
$("testRomajiCheck").onchange=e=>{state.romaji=e.target.checked; nextQuestion();};
$("backLevelsBtn").onclick=()=>{renderLevels(); show("levels")};
$("prevBtn").onclick=prevCard; $("nextBtn").onclick=nextCard; $("revealBtn").onclick=reveal;
$("startTestBtn").onclick=startTest; $("skipBtn").onclick=nextQuestion; $("testNextBtn").onclick=nextQuestion; $("testBackBtn").onclick=()=>{renderTestConfig(); show("testConfig")};
$("resetBtn").onclick=()=>{state.romaji=false;state.selected.clear();show("home");toast("Reset")};
window.addEventListener("keydown", e=>{ if(e.target.tagName==="INPUT") return; if(state.screen==="flash"&&e.code==="Space"){e.preventDefault();reveal()} });
show("home");
</script>
</body>
</html>
