<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kanji Practice</title>
  <style>
    :root{--bg:#0b0f1a;--card:#111a2f;--line:rgba(255,255,255,.12);--text:#eef2ff;--muted:#a8b0c3;--accent:#7cdbff;--good:#34d399;--bad:#fb7185}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;padding:20px;background:radial-gradient(900px 480px at 10% 0%,rgba(124,219,255,.10),transparent 55%),var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI","Noto Sans JP",Meiryo,sans-serif;display:flex;justify-content:center;align-items:center}.app{width:min(980px,100%)}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}.brand{display:flex;gap:10px;align-items:center}.logo{width:42px;height:42px;border-radius:14px;border:1px solid rgba(124,219,255,.35);display:grid;place-items:center;color:var(--accent);font-weight:900}.title{font-size:18px;font-weight:900}
    .panel,.card{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.025));border-radius:20px;box-shadow:0 12px 30px rgba(0,0,0,.35)}.panel{padding:18px}.card{padding:16px;margin-top:12px}.hidden{display:none!important}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.between{justify-content:space-between}button,.chip{border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--text);padding:10px 13px;border-radius:14px;font-weight:800;cursor:pointer}button:hover{border-color:rgba(124,219,255,.45);background:rgba(124,219,255,.09)}.primary{border-color:rgba(124,219,255,.45);background:rgba(124,219,255,.13)}.danger{border-color:rgba(251,113,133,.45);background:rgba(251,113,133,.11)}.muted{color:var(--muted);font-size:13px}.list{display:flex;flex-direction:column;gap:10px}.item{display:flex;justify-content:space-between;gap:12px;align-items:center;border:1px solid var(--line);background:rgba(15,23,42,.58);border-radius:16px;padding:12px}.chars{color:var(--muted);font-size:13px;line-height:1.5}.stage{min-height:285px;border:1px dashed var(--line);border-radius:20px;display:grid;place-items:center;text-align:center;background:rgba(0,0,0,.12);padding:16px}.big{font-size:92px;font-weight:900;line-height:1.25;margin:0}.word{font-size:44px;font-weight:900;margin:8px 0 0}.reading{font-size:26px;font-weight:900;margin:8px 0 0}.hint{font-size:13px;color:var(--muted);margin-top:10px}ruby{ruby-position:over;ruby-align:center}rt{font-size:26px;font-weight:900;color:var(--text);line-height:1}.rroma{display:block;font-size:14px;color:var(--muted);font-weight:800;margin-top:3px}.options{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px}@media(min-width:720px){.options{grid-template-columns:1fr 1fr}}.opt{text-align:left;min-height:56px}.good{border-color:rgba(52,211,153,.55)!important;background:rgba(52,211,153,.12)!important}.bad{border-color:rgba(251,113,133,.55)!important;background:rgba(251,113,133,.12)!important}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);opacity:0;transition:.18s;background:rgba(15,23,42,.95);border:1px solid var(--line);border-radius:999px;padding:10px 14px}.toast.show{opacity:1;transform:translateX(-50%) translateY(-3px)}
  </style>
</head>
<body>
  <div class="app">
    <div class="top"><div class="brand"><div class="logo">字</div><div class="title">Kanji Practice</div></div><div class="row"><button id="homeBtn">Home</button><button id="levelBtn">Levels</button><button id="resetBtn" class="danger">Reset</button></div></div>
    <div class="panel">
      <section id="home"><div class="card"><h2>Choose mode</h2><div class="row"><button id="goTest" class="primary">Test mode</button><button id="goFlash">Flashcards</button></div><p class="muted">Flashcards: Space / Revealで答えを表示。Romajiチェックでローマ字も表示。</p></div></section>
      <section id="levels" class="hidden"><div class="row between"><h2>Levels</h2><label class="chip"><input id="romaji" type="checkbox"> Show Romaji</label></div><div id="levelList" class="list"></div></section>
      <section id="flash" class="hidden"><div class="row between"><b id="badge">Level</b><span id="progress" class="muted">0 / 0</span></div><div class="stage"><div><div id="prompt" class="big">漢</div><div id="word" class="word hidden"></div><div id="wordReading" class="reading hidden"></div><div id="hint" class="hint">Space: show reading</div></div></div><div class="row between" style="margin-top:12px"><div class="row"><button id="prevBtn">← Prev</button><button id="revealBtn" class="primary">Reveal</button><button id="nextBtn">Next →</button></div><button id="backLevelBtn">Back</button></div></section>
      <section id="testConfig" class="hidden"><div class="row between"><h2>Test range</h2><div class="row"><label class="chip"><input id="testRomaji" type="checkbox"> Show Romaji</label><button id="startTest" class="primary">Start test</button></div></div><div id="testLevelList" class="list"></div></section>
      <section id="test" class="hidden"><div class="row between"><b id="testBadge">TEST</b><span id="score" class="muted">0 / 0</span></div><div class="stage"><div><p id="q" class="big">漢</p><div id="mark" class="reading hidden"></div><div id="testHint" class="hint">Pick the correct reading</div></div></div><div id="options" class="options"></div><div class="row between" style="margin-top:12px"><div class="row"><button id="skipBtn">Skip</button><button id="testNext" class="primary" disabled>Next</button></div><button id="testBack">Back</button></div></section>
    </div>
  </div><div id="toast" class="toast"></div>
<script>
(()=>{
'use strict';
const KANJI_POOL=[
{kanji:'見ます',reading:'み'},{kanji:'行きます',reading:'い'},{kanji:'米',reading:'こめ'},{kanji:'来ます',reading:'き'},{kanji:'良い',reading:'い'},{kanji:'食べます',reading:'た'},
{kanji:'飲みます',reading:'の'},{kanji:'会います',reading:'あ'},{kanji:'耳',reading:'みみ'},{kanji:'聞きます',reading:'き'},{kanji:'言います',reading:'い'},{kanji:'話します',reading:'はな'},
{kanji:'立ちます',reading:'た'},{kanji:'待ちます',reading:'ま'},{kanji:'周ります',reading:'まわ'},{kanji:'週',reading:'しゅう',word:'先週',wordReading:'せんしゅう'},{kanji:'大きい',reading:'おお'},{kanji:'小さい',reading:'ちい'},
{kanji:'高い',reading:'たか'},{kanji:'安い',reading:'やす'},{kanji:'国',reading:'くに',word:'王国',wordReading:'おうこく'},{kanji:'王',reading:'おう',word:'王国',wordReading:'おうこく'},{kanji:'年',reading:'ねん'},{kanji:'父',reading:'ちち'},
{kanji:'男',reading:'おとこ'},{kanji:'女',reading:'おんな'},{kanji:'母',reading:'はは'},{kanji:'子',reading:'こ'}
];
const COMPOUNDS=[{kanji:'先週',reading:'せんしゅう'},{kanji:'王国',reading:'おうこく'}];
const $=id=>document.getElementById(id); const els=['home','levels','flash','testConfig','test','levelList','testLevelList','romaji','testRomaji','badge','progress','prompt','word','wordReading','hint','q','mark','testHint','options','score','testBadge','toast'].reduce((o,id)=>(o[id]=$(id),o),{});
const state={screen:'home',level:0,deck:[],index:0,phase:0,romaji:false,selected:new Set(),locked:false,correct:0,total:0,current:null};
function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function kanaToRomaji(s){const m={あ:'a',い:'i',う:'u',え:'e',お:'o',か:'ka',き:'ki',く:'ku',け:'ke',こ:'ko',さ:'sa',し:'shi',す:'su',せ:'se',そ:'so',た:'ta',ち:'chi',つ:'tsu',て:'te',と:'to',な:'na',に:'ni',ぬ:'nu',ね:'ne',の:'no',は:'ha',ひ:'hi',ふ:'fu',へ:'he',ほ:'ho',ま:'ma',み:'mi',む:'mu',め:'me',も:'mo',や:'ya',ゆ:'yu',よ:'yo',ら:'ra',り:'ri',る:'ru',れ:'re',ろ:'ro',わ:'wa',を:'o',ん:'n',が:'ga',ぎ:'gi',ぐ:'gu',げ:'ge',ご:'go',ざ:'za',じ:'ji',ず:'zu',ぜ:'ze',ぞ:'zo',だ:'da',ぢ:'ji',づ:'zu',で:'de',ど:'do',ば:'ba',び:'bi',ぶ:'bu',べ:'be',ぼ:'bo',ぱ:'pa',ぴ:'pi',ぷ:'pu',ぺ:'pe',ぽ:'po'};return String(s||'').split('').map(ch=>m[ch]||ch).join('');}
function chunk(arr,n=6){const out=[];for(let i=0;i<arr.length;i+=n)out.push(arr.slice(i,i+n));return out;} const LEVELS=chunk(KANJI_POOL,6);
function show(name){state.screen=name;['home','levels','flash','testConfig','test'].forEach(id=>els[id].classList.toggle('hidden',id!==name));}
function toast(msg){els.toast.textContent=msg;els.toast.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>els.toast.classList.remove('show'),1100)}
function renderLevels(){els.levelList.innerHTML=LEVELS.map((cards,i)=>`<div class="item"><div><b>Level ${i+1}</b><div class="chars">${escapeHtml(cards.map(c=>c.kanji).join('　'))}</div></div><button class="primary" data-level="${i}">Open</button></div>`).join('');els.levelList.querySelectorAll('button').forEach(b=>b.onclick=()=>openLevel(Number(b.dataset.level)));els.romaji.checked=state.romaji;show('levels');}
function openLevel(i){state.level=i;state.deck=LEVELS[i];state.index=0;state.phase=0;els.badge.textContent=`Level ${i+1}`;renderFlash();show('flash');}
function ruby(card){if(state.phase<1)return escapeHtml(card.kanji);const rt=state.romaji?`${escapeHtml(card.reading)}<span class="rroma">${escapeHtml(kanaToRomaji(card.reading))}</span>`:escapeHtml(card.reading);return `<ruby><rb>${escapeHtml(card.kanji)}</rb><rt>${rt}</rt></ruby>`;}
function renderFlash(){const c=state.deck[state.index];els.prompt.innerHTML=ruby(c);els.progress.textContent=`${state.index+1} / ${state.deck.length}`;els.word.textContent=c.word||'—';els.wordReading.textContent=c.wordReading?(state.romaji?`${c.wordReading} / ${kanaToRomaji(c.wordReading)}`:c.wordReading):'';els.word.classList.toggle('hidden',state.phase<2);els.wordReading.classList.toggle('hidden',!(state.phase>=3&&c.wordReading));els.hint.textContent=['Space: show reading','Space: show word','Space: show word reading','Space: next kanji'][state.phase]||'';}
function move(d){state.index=(state.index+d+state.deck.length)%state.deck.length;state.phase=0;renderFlash();}
function reveal(){if(state.phase<3){state.phase++;renderFlash();}else move(1)}
function renderTestConfig(){if(state.selected.size===0)LEVELS.forEach((_,i)=>state.selected.add(i));els.testLevelList.innerHTML=LEVELS.map((cards,i)=>`<label class="item"><span><input type="checkbox" data-level="${i}" ${state.selected.has(i)?'checked':''}> <b>Level ${i+1}</b><div class="chars">${escapeHtml(cards.map(c=>c.kanji).join('　'))}</div></span></label>`).join('');els.testLevelList.querySelectorAll('input').forEach(cb=>cb.onchange=()=>{const n=Number(cb.dataset.level);cb.checked?state.selected.add(n):state.selected.delete(n)});els.testRomaji.checked=state.romaji;show('testConfig');}
function allReadings(){return [...new Set(KANJI_POOL.map(c=>c.reading).concat(COMPOUNDS.map(c=>c.reading)))];}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a;}
function startTest(){const items=[...state.selected].flatMap(i=>LEVELS[i].map(c=>({kind:'KANJI',kanji:c.kanji,reading:c.reading}))).concat(COMPOUNDS.map(c=>({kind:'WORD',kanji:c.kanji,reading:c.reading})));if(items.length<4){toast('Need 4+ cards');return}state.items=items;state.correct=0;state.total=0;nextQuestion();show('test');}
function nextQuestion(){state.locked=false;els.testNext.disabled=true;els.mark.className='reading hidden';els.options.innerHTML='';const item=state.items[Math.floor(Math.random()*state.items.length)];state.current=item;els.q.textContent=item.kanji;els.testBadge.textContent=item.kind;els.testHint.textContent='Pick the correct reading';els.score.textContent=`${state.correct} / ${state.total}`;const opts=shuffle([item.reading,...shuffle(allReadings().filter(x=>x!==item.reading)).slice(0,3)]);els.options.innerHTML=opts.map(o=>`<button class="opt"><b>${escapeHtml(o)}</b><div class="muted">${state.romaji?escapeHtml(kanaToRomaji(o)):''}</div></button>`).join('');els.options.querySelectorAll('button').forEach(b=>b.onclick=()=>answer(b.textContent.trim().split('\n')[0],item.reading));}
function answer(chosen,correct){if(state.locked)return;state.locked=true;state.total++;if(chosen===correct)state.correct++;els.options.querySelectorAll('button').forEach(b=>{const v=b.textContent.trim().split('\n')[0];if(v===correct)b.classList.add('good');else if(v===chosen)b.classList.add('bad');b.disabled=true});els.mark.textContent=chosen===correct?'◯':'✕';els.mark.className='reading '+(chosen===correct?'good':'bad');els.testHint.textContent=chosen===correct?`Correct: ${correct}`:`Wrong · Answer: ${correct}`;els.score.textContent=`${state.correct} / ${state.total}`;els.testNext.disabled=false;}
$('homeBtn').onclick=()=>show('home');$('levelBtn').onclick=renderLevels;$('goFlash').onclick=renderLevels;$('goTest').onclick=renderTestConfig;$('romaji').onchange=e=>{state.romaji=e.target.checked;if(state.screen==='flash')renderFlash()};$('testRomaji').onchange=e=>{state.romaji=e.target.checked};$('backLevelBtn').onclick=renderLevels;$('prevBtn').onclick=()=>move(-1);$('nextBtn').onclick=()=>move(1);$('revealBtn').onclick=reveal;$('startTest').onclick=startTest;$('skipBtn').onclick=nextQuestion;$('testNext').onclick=nextQuestion;$('testBack').onclick=renderTestConfig;$('resetBtn').onclick=()=>{state.romaji=false;state.selected.clear();show('home');toast('Reset')};window.addEventListener('keydown',e=>{if(e.target&&e.target.tagName==='INPUT')return;if(state.screen==='flash'&&e.code==='Space'){e.preventDefault();reveal()}});show('home');
})();
</script>
</body>
</html>
